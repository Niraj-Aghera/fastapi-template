# Exclude a variety of commonly ignored directories.
exclude = [
    "libs/database/migrations",
    "infrastructure/scripts/*",
    "database",
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black.
line-length = 140
indent-width = 4

# Assume Python 3.13
target-version = "py313"

[lint]

# List of enabled rulsets. See https://docs.astral.sh/ruff/rules/ for more information.
select = [
    "E",   # Error
    "F",   # Pyflakes
    "W",   # Pycodestyle
    "C90", # McCabe complexity
    "I",   # Isort
    "N",   # pep8-naming
    "D",   # Pydocstyle
    "ANN", # Pytype annotations
    "S",   # Bandit
    "B",   # Bugbear
    "T20", # Catch prints
    "PYI", # validate pyi files
    "Q",   # Checks for quotes
    "RSE", # Checks raise statements
    "RET", # Checks return statements
    "SLF", # Self checks
    "SIM", # Simplificator
    "PTH", # Pathlib checks
    "ERA", # Checks for commented out code
    "PL",  # PyLint checks
    "RUF", # Specific to Ruff checks
]

# List of disabled rules. See https://docs.astral.sh/ruff/rules/ for more information.
ignore = [
    "E501",  # Line too long (handled by formatter)
    # Docstring rules - ignore for now
    "D100",  # Missing docstring in public module
    "D101",  # Missing docstring in public class
    "D103",  # Missing docstring in public function
    "D104",  # Missing docstring in public package
    "D200",  # One-line docstring should fit on one line
    "D205",  # 1 blank line required between summary line and description
    "D107",  # Missing docstring in __init__
    "D212",  # Multi-line docstring summary should start at the first line
]
# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# Allow max code complexity of 12
mccabe = { max-complexity = 12 }

[lint.per-file-ignores]
"tests/*" = [
    "S101",    # Use of assert detected
    "S108",    # Hardcoded temporary file/directory paths (fine in tests)
    "S311",    # Standard pseudo-random generators (fine in tests)
    "PL",      # All
    "D",       # Disable all documentation rules for tests
    "ANN",     # Disable type annotation rules for tests
    "PLR2004", # Magic numbers in tests are fine
    "PLW0603", # Global statement in tests is fine
    "F403",    # Star imports are acceptable in tests
    "F405",    # Names from star imports may be undefined
]
# Framework integration points where Any is appropriate
"app/middlewares/authentication.py" = ["ANN401"]  # FastAPI middleware dispatch
"app/schema/api_response.py" = ["ANN401"]         # Generic response data
"app/server.py" = ["ANN401"]                      # Gunicorn integration
"infra/server/gunicorn.py" = ["ANN401"]           # Gunicorn integration
"libs/logger/handler.py" = ["ANN401"]             # Logger type integration
"app/config/settings.py" = ["S104"]               # Web server needs to bind to all interfaces

[lint.pydocstyle]
convention = "google"
ignore-decorators = ["typing.overload"]

[lint.pylint]
allow-magic-value-types = ["int", "str", "float", "bytes"]
max-statements = 60

[format]
# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

[lint.isort]
combine-as-imports = true
split-on-trailing-comma = false
lines-after-imports = 2
