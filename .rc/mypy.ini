[mypy]
# Python version
python_version = 3.13

# General settings
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
strict_optional = true

# Import discovery
ignore_missing_imports = true
follow_imports = normal
follow_imports_for_stubs = true

# Error messages
show_error_codes = true
pretty = true

# Disable specific error codes that are problematic with Pydantic
disable_error_code = call-arg,import-untyped

# Pydantic plugin
plugins = pydantic.mypy

# Disallow dynamic typing
disallow_any_unimported = false
disallow_any_expr = false
disallow_any_decorated = false
disallow_any_explicit = false
disallow_any_generics = true
disallow_subclassing_any = true

# Miscellaneous strictness flags
allow_redefinition = false
local_partial_types = true
implicit_reexport = false
extra_checks = true

# Exclude patterns
exclude = (^libs/database/migrations/.*$|^tests/.*|^app/config/settings\.py$|^main\.py$|^infra/server/gunicorn\.py$|^\.rc/vulture_allowlist\.py$)

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

# Module-specific settings
[mypy.plugins.pydantic.*]
init_typed = true

[mypy-tests.*]
disallow_untyped_defs = false
check_untyped_defs = false

[mypy-app.config.settings]
# Pydantic BaseSettings handles initialization automatically
disable_error_code = call-arg

[mypy-main]
# Pydantic BaseSettings handles initialization automatically
disable_error_code = call-arg

# Module-specific settings for third-party libraries
[mypy-celery.*]
ignore_missing_imports = true

[mypy-gunicorn.*]
ignore_missing_imports = true

[mypy-factory.*]
ignore_missing_imports = true
